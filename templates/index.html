<!DOCTYPE html>
<html>
<head>
    <title>AI-Powered Chatbot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        *{
            box-sizing:border-box;
            margin:0;
            padding:0;
            font-family:Arial, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .chat-container{
            width:420px;
            height:700px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 20px 50px rgba(0,0,0,0.25);
            display:flex;
            flex-direction:column;
        }

        .header{
            background:#4CAF50;
            color:white;
            padding:18px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
        }

        #chatbox{
            flex:1;
            padding:20px;
            overflow-y:auto;
            background:#f7f8fc;
        }

        .message{
            margin:12px 0;
            display:flex;
            width:100%;
        }

        .user-wrap{
            justify-content:flex-end;
        }

        .bot-wrap{
            justify-content:flex-start;
        }

        .bubble{
            max-width:75%;
            padding:12px 16px;
            border-radius:18px;
            line-height:1.4;
            font-size:15px;
            box-shadow:0 2px 6px rgba(0,0,0,0.08);
        }

        .user{
            background:#4CAF50;
            color:white;
            border-bottom-right-radius:5px;
        }

        .bot{
            background:white;
            color:#333;
            border:1px solid #ddd;
            border-bottom-left-radius:5px;
        }

        .typing{
            display:inline-block;
            width:60px;
        }

        .typing span{
            height:8px;
            width:8px;
            margin:0 2px;
            background:#777;
            border-radius:50%;
            display:inline-block;
            animation:bounce 1.3s infinite;
        }

        .typing span:nth-child(2){
            animation-delay:.2s;
        }

        .typing span:nth-child(3){
            animation-delay:.4s;
        }

        @keyframes bounce{
            0%,80%,100%{transform:scale(0);}
            40%{transform:scale(1);}
        }

        .input-area{
            display:flex;
            padding:12px;
            border-top:1px solid #ddd;
            background:white;
        }

        #message{
            flex:1;
            border:1px solid #ccc;
            border-radius:30px;
            padding:12px 18px;
            font-size:15px;
            outline:none;
        }

        button{
            margin-left:10px;
            border:none;
            background:#4CAF50;
            color:white;
            padding:12px 22px;
            border-radius:30px;
            cursor:pointer;
            font-size:15px;
            font-weight:bold;
        }

        button:hover{
            background:#43a047;
        }

        @media(max-width:500px){
            .chat-container{
                width:100%;
                height:100vh;
                border-radius:0;
            }
        }
    </style>
</head>
<body>

<div class="chat-container">

    <div class="header">
        🤖 AI Support Assistant
    </div>

    <div id="chatbox"></div>

    <div class="input-area">
        <input type="text" id="message" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
async function sendMessage(){

    const input=document.getElementById("message");
    const msg=input.value.trim();

    if(!msg) return;

    const chatbox=document.getElementById("chatbox");

    chatbox.innerHTML += `
        <div class="message user-wrap">
            <div class="bubble user">${msg}</div>
        </div>
    `;

    input.value="";
    chatbox.scrollTop=chatbox.scrollHeight;

    const typingId="typing-"+Date.now();

    chatbox.innerHTML += `
        <div class="message bot-wrap" id="${typingId}">
            <div class="bubble bot">
                <div class="typing">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
    `;

    chatbox.scrollTop=chatbox.scrollHeight;

    const response=await fetch("/chat",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            message:msg
        })
    });

    const data=await response.json();

    document.getElementById(typingId).remove();

    chatbox.innerHTML += `
        <div class="message bot-wrap">
            <div class="bubble bot">${data.reply}</div>
        </div>
    `;

    chatbox.scrollTop=chatbox.scrollHeight;
}

document
.getElementById("message")
.addEventListener("keypress",function(e){
    if(e.key==="Enter"){
        sendMessage();
    }
});
</script>

</body>
</html>
