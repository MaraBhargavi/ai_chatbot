<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .login-box{
            width:380px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 20px 50px rgba(0,0,0,0.25);
            text-align:center;
        }

        h1{
            margin-bottom:25px;
            color:#333;
        }

        input{
            width:100%;
            padding:14px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
            outline:none;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:#4CAF50;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#43a047;
        }

        .error{
            color:red;
            margin-top:12px;
        }
    </style>
</head>
<body>

<div class="login-box">

    <h1>🔐 Admin Login</h1>

    <form method="POST">
        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">Login</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

</div>

</body>
</html>
