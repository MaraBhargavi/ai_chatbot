<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            padding:30px;
        }

        .container{
            max-width:1200px;
            margin:auto;
            background:white;
            border-radius:20px;
            padding:30px;
            box-shadow:0 20px 50px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#333;
        }

        .stats{
            display:flex;
            gap:20px;
            margin-bottom:25px;
            flex-wrap:wrap;
        }

        .card{
            flex:1;
            min-width:220px;
            background:#f7f8fc;
            padding:25px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 5px 15px rgba(0,0,0,0.08);
        }

        .card h2{
            color:#4CAF50;
            font-size:32px;
            margin-bottom:10px;
        }

        .card p{
            color:#666;
            font-size:16px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:12px;
        }

        th{
            background:#4CAF50;
            color:white;
            padding:15px;
            text-align:left;
        }

        td{
            padding:14px;
            border-bottom:1px solid #eee;
        }

        tr:hover{
            background:#f9f9f9;
        }

        .user{
            color:#1976d2;
            font-weight:bold;
        }

        .bot{
            color:#2e7d32;
        }

        .time{
            color:#777;
            font-size:14px;
        }

        .live{
            text-align:center;
            margin-bottom:15px;
            color:#4CAF50;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>📊 AI Chatbot Admin Dashboard</h1>

    <div class="live">● Live Monitoring</div>

    <div class="stats">
        <div class="card">
            <h2 id="totalChats">0</h2>
            <p>Total Chats</p>
        </div>

        <div class="card">
            <h2 id="totalUsers">1</h2>
            <p>Active Session</p>
        </div>

        <div class="card">
            <h2>Online</h2>
            <p>Bot Status</p>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>User Message</th>
                <th>Bot Reply</th>
                <th>Time</th>
            </tr>
        </thead>

        <tbody id="chatTable"></tbody>
    </table>

</div>

<script>
async function loadChats(){

    const response = await fetch("/get_chats");
    const data = await response.json();

    document.getElementById("totalChats").innerText = data.length;

    let html = "";

    data.forEach(chat=>{
        html += `
            <tr>
                <td class="user">${chat[0]}</td>
                <td class="bot">${chat[1]}</td>
                <td class="time">${chat[2]}</td>
            </tr>
        `;
    });

    document.getElementById("chatTable").innerHTML = html;
}

loadChats();
setInterval(loadChats,2000);
</script>

</body>
</html>
